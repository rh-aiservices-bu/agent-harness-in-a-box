# MLflow tracing environment variables for OpenCode sandboxes.
# These can be injected into sandbox pods via the OpenShell gRPC API
# or set manually after connecting to a sandbox.
#
# Usage: export these variables inside a sandbox session, or use them
# as a reference for configuring the SandboxSpec.environment field.

env:
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow.openshell.svc.cluster.local:5000"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "opencode-sandbox"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://mlflow.openshell.svc.cluster.local:5000"
  - name: OTEL_EXPORTER_OTLP_PROTOCOL
    value: "http/protobuf"
