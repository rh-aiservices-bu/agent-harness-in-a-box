# Network policy for OpenCode sandboxes.
# Applied with: openshell policy set --global --policy policy.yaml --yes

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /proc
    - /dev/urandom
    - /etc
    - /opt
    - /var/log
  read_write:
    - /sandbox
    - /workspace
    - /tmp
    - /home/sandbox
    - /dev/null
    - /dev/zero

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  anthropic_api:
    name: "Anthropic API"
    endpoints:
      - host: api.anthropic.com
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  openai_api:
    name: "OpenAI API"
    endpoints:
      - host: api.openai.com
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  google_vertex:
    name: "Google Vertex AI"
    endpoints:
      - host: "*.googleapis.com"
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  github:
    name: "GitHub"
    endpoints:
      - host: github.com
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.github.com
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.githubusercontent.com"
        ports: [443]
        enforcement: enforce
        access: read-only
    binaries:
      - { path: "**" }

  npm_registry:
    name: "npm"
    endpoints:
      - host: registry.npmjs.org
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  pypi:
    name: "PyPI"
    endpoints:
      - host: pypi.org
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.pythonhosted.org
        ports: [443]
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  openshift_oauth:
    name: "OpenShift OAuth (for RHOAI auth)"
    endpoints:
      - host: "oauth-openshift.apps.ocp.g4fp9.sandbox3225.opentlc.com"
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  litellm_maas:
    name: "LiteLLM MaaS"
    endpoints:
      - host: "maas-rhdp.apps.maas.redhatworkshops.io"
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.redhatworkshops.io"
        ports: [443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  mlflow_rhoai:
    name: "RHOAI MLflow (in-cluster)"
    endpoints:
      - host: "mlflow.redhat-ods-applications.svc.cluster.local"
        ports: [8443]
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "**" }

  opencode_updates:
    name: "OpenCode"
    endpoints:
      - host: opencode.ai
        ports: [443]
        enforcement: enforce
        access: read-only
    binaries:
      - { path: "**" }
