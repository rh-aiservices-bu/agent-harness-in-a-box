# CTF permissive sandbox policy - adds httpbin.org for hot-reload demo.
# Same as policy-ctf-strict.yaml but with an additional httpbin endpoint
# to demonstrate dynamic policy updates (Challenge 5).
#
# Apply:  openshell policy set [--wait] <sandbox-name> --policy config/policy-ctf-permissive.yaml

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /proc
    - /dev/urandom
    - /etc
  read_write:
    - /sandbox
    - /workspace
    - /tmp
    - /dev/null
    - /dev/zero

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  litellm_inference:
    name: "LiteLLM Inference (python3/node only)"
    endpoints:
      - host: "maas-rhdp.apps.maas.redhatworkshops.io"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.redhatworkshops.io"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.12 }
      - { path: "/sandbox/.uv/python/**" }
      - { path: /usr/bin/node }

  github_api:
    name: "GitHub API (read-only, curl+python3)"
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.12 }

  httpbin:
    name: "HTTPBin (testing - hot-reload demo)"
    endpoints:
      - host: "httpbin.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.12 }
